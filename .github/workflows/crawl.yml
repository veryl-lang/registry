name: crawl

# Build docs for every published version of every non-yanked entry. Runs on every
# push to master (deploy on merge), daily (pick up new upstream releases), and on
# demand. Read-only on the index; it only writes the docs site to gh-pages. Docs
# are immutable per (repo, project, version) and skipped if already built with the
# current chrome, so the gh-pages checkout makes crawling incremental.

on:
  # Any merge to master rebuilds the site immediately: a merged submission adds a
  # new entry, and a normal PR may change the gallery/doc-page design. No paths
  # filter, so design-only PRs deploy too. The schedule catches new upstream
  # releases of already-registered repos between merges.
  push:
    branches:
      - master
  schedule:
    - cron: "0 3 * * *" # daily 03:00 UTC (bounds "not pushed yet" latency to ~1 day)
  workflow_dispatch:
    inputs:
      force:
        description: "Rebuild every doc version, ignoring the chrome stamp"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout index (master)
        uses: actions/checkout@v6

      - name: Checkout docs site (gh-pages)
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: site
        continue-on-error: true # first run: branch may not exist yet

      # Rust for the indexer, and to build veryl from master (below).
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # vip and other projects using not-yet-released features (e.g. `[[components]]`)
      # need a compiler ahead of the latest release, so build veryl from master rather
      # than setup-veryl (which installs releases). Cache the binary keyed on veryl's
      # master SHA: rebuild only when master moves, reuse otherwise. Revert to
      # veryl-lang/setup-veryl@v1 once a release covers the features these repos use.
      - name: Resolve veryl master revision
        id: veryl
        run: echo "sha=$(git ls-remote https://github.com/veryl-lang/veryl.git HEAD | cut -f1)" >> "$GITHUB_OUTPUT"
      - name: Cache veryl binary
        id: veryl-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/veryl/bin/veryl
          key: veryl-master-${{ steps.veryl.outputs.sha }}
      - name: Build veryl from master
        if: steps.veryl-cache.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/veryl-lang/veryl.git --rev ${{ steps.veryl.outputs.sha }} --profile release-verylup --locked --root ~/.local/veryl veryl
      - name: Add veryl to PATH
        run: echo "$HOME/.local/veryl/bin" >> "$GITHUB_PATH"

      - name: Crawl and build docs
        run: |
          mkdir -p site
          cargo run -p registry-indexer --release -- crawl --docs-out site ${{ inputs.force && '--force' || '' }}

      - name: Publish docs (gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          # Rewrite the Pages custom-domain CNAME every run (peaceiris replaces
          # the branch, which would otherwise drop it). Remove if not using one.
          cname: registry.veryl-lang.org
