name: Regression

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: Run tests
        run: cargo test --locked

  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Run rustfmt
        run: cargo fmt -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  # The Worker ships as wasm (wrangler deploy builds this target). The host test
  # and clippy jobs compile it for the host, so build it for wasm32 here to catch
  # target-specific breakage before deploy.
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: Build worker for wasm
        run: cargo build -p registry-worker --target wasm32-unknown-unknown
